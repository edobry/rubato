app = "rubato"
primary_region = "sjc"

[build]

[env]
  NODE_ENV = "production"
  TLS = "false"
  PORT = "8080"
  DATA_DIR = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "rubato_data"
  destination = "/data"
